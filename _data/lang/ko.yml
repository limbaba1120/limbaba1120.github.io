# for cookie consent
cookie_consent:
  privacy_policy_link_text: *privacy_policy_title
  side_nav_setting_button_tooltip: &cookie_settings 쿠키 설정
  panel_bar:
    msg: >
      이 웹사이트는 사이트 기능 최적화를 위해 쿠키를 사용합니다.
      동의해 주셔야 활성화됩니다.
    privacy_msg: $privacy_link 를 확인해 주세요.
    buttons:
      accept: &accept_button 모두 허용
      settings: 사용자 설정
      deny: &deny_button 거부
      close: 닫기
  panel_settings:
    title: *cookie_settings
    msg: >
      이 웹사이트는 사이트 기능 최적화를 위해 쿠키를 사용합니다.
      동의해 주셔야 활성화됩니다. 쿠키 정책을 보려면 아래 항목을 클릭하세요.
    privacy_msg: $privacy_link 를 확인해 주세요.
    buttons:
      accept: *accept_button
      save: 선택만 허용
      deny: *deny_button
    always_active: 항상 활성
    consent_types:
      necessary:
        title: 필수 쿠키
        info: >
          이 쿠키는 사이트 기본 기능에 필요해 비활성화할 수 없습니다.
          색상 테마 같은 기능을 변경할 때 설정됩니다.
          개인 식별 정보를 저장하지 않습니다.
          $gtag_info
      analytics:
        title: 성능 쿠키
        info: $gtag_info
      preferences:
        title: 기능 쿠키
        info: $gtag_info
      advertising:
        title: 타겟·광고 쿠키
        info: $gtag_info
    gtag_info:
      ad_storage: >
        광고 관련 저장(쿠키 등)을 활성화합니다.
      analytics_storage: >
        분석 관련 저장(쿠키 등) — 예: 방문 시간 측정 — 을 활성화합니다.
      functionality_storage: >
        사이트·앱 기능을 지원하는 저장 — 예: 언어 설정 — 을 활성화합니다.
      personalization_storage: >
        개인화 관련 저장 — 예: 영상 추천 — 을 활성화합니다.
      security_storage: >
        보안 관련 저장 — 예: 인증, 사기 방지 등 사용자 보호 — 을 활성화합니다.
